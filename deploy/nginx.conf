# /etc/nginx/sites-available/eikaiwa
# 既存の他のアプリと共存できる独立した server ブロック

upstream eikaiwa_gunicorn {
    server unix:/run/eikaiwa.sock fail_timeout=0;
}

server {
    listen 80;
    server_name api.your-domain.com;  # ← CloudFront オリジンとして使うドメインに変更

    # CloudFront からのみアクセスを許可する場合は以下を有効化
    # CloudFront の IP レンジ: https://ip-ranges.amazonaws.com/ip-ranges.json
    # allow 130.176.0.0/16;
    # deny all;

    # CloudFront が転送する実際のクライアントIPを取得
    set_real_ip_from 130.176.0.0/16;
    set_real_ip_from 204.246.164.0/22;
    set_real_ip_from 205.251.196.0/22;
    set_real_ip_from 54.182.0.0/16;
    real_ip_header X-Forwarded-For;

    # 静的ファイル
    location /static/ {
        alias /var/www/eikaiwa/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # メディアファイル
    location /media/ {
        alias /var/www/eikaiwa/media/;
    }

    # Django API
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://eikaiwa_gunicorn;
        proxy_read_timeout 120s;
    }

    # ログ
    access_log /var/log/nginx/eikaiwa_access.log;
    error_log  /var/log/nginx/eikaiwa_error.log;
}
