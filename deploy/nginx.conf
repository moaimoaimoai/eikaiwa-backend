# ============================================================
# eikaiwa API — Nginx 設定
#
# 【既存の api.nicelinks.net の server ブロックに追記する】
# 既存の /etc/nginx/sites-available/api.nicelinks.net を開いて
# 以下の upstream と location ブロックをそれぞれ追加する
# ============================================================

# ── upstream（server ブロックの外、ファイルの先頭付近に追加）──────────
upstream eikaiwa_gunicorn {
    server unix:/run/eikaiwa/eikaiwa.sock fail_timeout=0;
}

# ── location ブロック（既存の server ブロック内に追加）────────────────
# 既存の server ブロック（api.nicelinks.net）の中に以下を追記する

    # eikaiwa API
    location /eikaiwa/ {
        # /eikaiwa/ プレフィックスを Django に渡す（strip しない）
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Host $http_host;
        proxy_set_header SCRIPT_NAME /eikaiwa;
        proxy_redirect off;
        proxy_pass http://eikaiwa_gunicorn;
        proxy_read_timeout 120s;

        access_log /var/log/nginx/eikaiwa_access.log;
        error_log  /var/log/nginx/eikaiwa_error.log;
    }

    # 静的ファイル
    location /eikaiwa-static/ {
        alias /var/www/eikaiwa/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
